name: RH Agent - Cacador de Vagas

on:
  schedule:
    - cron: '0 12 * * *'  # 09:00 BRT
    - cron: '0 15 * * *'  # 12:00 BRT
    - cron: '0 16 * * *'  # 13:00 BRT
    - cron: '0 21 * * *'  # 18:00 BRT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rh-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hunt_and_notify:
    name: Cacar vagas e notificar Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run RH agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOGIN_USER_LINKEDIN: ${{ secrets.LOGIN_USER_LINKEDIN }}
          KEY_SENHA_LINKEDIN: ${{ secrets.KEY_SENHA_LINKEDIN }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "12" ]; then LABEL="Ciclo Manha (09h)";
          elif [ "$HOUR" = "15" ]; then LABEL="Ciclo Meio-dia (12h)";
          elif [ "$HOUR" = "16" ]; then LABEL="Ciclo Tarde (13h)";
          else LABEL="Ciclo Noite (18h)"; fi

          echo "Iniciando: $LABEL"
          python rh_specialist.py "$LABEL"

      - name: Validate job quality policy
        run: |
          python - <<'PY'
          import json
          import sys
          from urllib.parse import urlparse

          blocked_patterns = [
              "fluent english required",
              "advanced english required",
              "business fluent english",
              "professional english required",
              "native english",
              "english is mandatory",
              "mandatory english",
              "c1 english",
              "c2 english",
              "english proficiency c1",
              "english proficiency c2",
              "bilingual mandatory",
              "must be fluent in english",
              "ingles fluente obrigatorio",
              "ingles avancado obrigatorio",
              "ingles obrigatorio",
              "ingles e obrigatorio",
          ]

          def valid_url(url: str) -> bool:
              if not url:
                  return False
              parsed = urlparse(url)
              return parsed.scheme in ("http", "https") and bool(parsed.netloc)

          with open("applications.json", "r", encoding="utf-8") as f:
              jobs = json.load(f)

          with open("run_summary.json", "r", encoding="utf-8") as f:
              summary = json.load(f)

          bad_lang = []
          bad_url = []
          for job in jobs:
              text = " ".join([
                  str(job.get("title", "")),
                  str(job.get("description", "")),
                  str(job.get("requirements", "")),
              ]).lower()

              if any(p in text for p in blocked_patterns):
                  bad_lang.append(job.get("title", "(sem titulo)"))

              if not valid_url(str(job.get("url", ""))):
                  bad_url.append(job.get("title", "(sem titulo)"))

          if "sources" not in summary:
              print("ERRO: run_summary.json sem campo sources")
              sys.exit(1)

          if bad_lang or bad_url:
              if bad_lang:
                  print("ERRO: Vagas com ingles obrigatorio detectadas:")
                  for title in bad_lang[:10]:
                      print(f" - {title}")
              if bad_url:
                  print("ERRO: Vagas com URL invalida detectadas:")
                  for title in bad_url[:10]:
                      print(f" - {title}")
              sys.exit(1)

          print(f"OK: {len(jobs)} vagas e run_summary.json validados.")
          PY

      - name: Commit and push data files
        run: |
          git config user.name 'RH-Agent-Bot'
          git config user.email 'rh-agent@carloscostato.com'
          git add applications.json run_summary.json
          git diff --staged --quiet || git commit -m "bot: atualiza vagas e resumo do ciclo [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
